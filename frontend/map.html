<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoMo Sentry — Fraud Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: #1a1d27;
      border-bottom: 1px solid #2a2d3a;
      flex-shrink: 0;
      flex-wrap: wrap;
      gap: 8px;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .logo span { color: #22c55e; }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .legend {
      display: flex;
      gap: 14px;
      font-size: 12px;
      color: #9ca3af;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .last-update {
      font-size: 11px;
      color: #4b5563;
    }

    #map {
      flex: 1;
      width: 100%;
    }

    .stats-bar {
      display: flex;
      gap: 20px;
      padding: 10px 20px;
      background: #1a1d27;
      border-top: 1px solid #2a2d3a;
      font-size: 12px;
      color: #6b7280;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .stat { display: flex; gap: 5px; }
    .stat strong { color: #f0f0f0; }

    .leaflet-popup-content-wrapper {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      color: #f0f0f0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .leaflet-popup-tip { background: #1a1d27; }
    .leaflet-popup-close-button { color: #6b7280 !important; }

    .popup-verdict {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 2px 8px;
      border-radius: 99px;
      display: inline-block;
      margin-bottom: 8px;
    }

    .popup-verdict.STOP    { background: #ef4444; color: #fff; }
    .popup-verdict.CAUTION { background: #f59e0b; color: #000; }

    .popup-narration {
      font-size: 13px;
      line-height: 1.5;
      color: #e5e7eb;
      margin-bottom: 8px;
    }

    .popup-meta {
      font-size: 11px;
      color: #4b5563;
    }

    .no-data {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 24px 32px;
      text-align: center;
      z-index: 1000;
      pointer-events: none;
    }

    .no-data p { font-size: 14px; color: #6b7280; margin-top: 6px; }

    .error-banner {
      background: #1f0606;
      border-bottom: 1px solid #7f1d1d;
      padding: 8px 20px;
      font-size: 12px;
      color: #fca5a5;
      display: none;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="logo">MoMo <span>Sentry</span> — Fraud Map</div>
    <div class="topbar-right">
      <div class="legend">
        <div class="legend-item">
          <div class="legend-dot" style="background:#ef4444"></div>
          STOP
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#f59e0b"></div>
          CAUTION
        </div>
      </div>
      <div class="last-update" id="lastUpdate">Loading...</div>
    </div>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <div id="map"></div>

  <div class="stats-bar">
    <div class="stat">STOP flags: <strong id="stopCount">—</strong></div>
    <div class="stat">CAUTION flags: <strong id="cautionCount">—</strong></div>
    <div class="stat">Total checks shown: <strong id="totalCount">—</strong></div>
    <div class="stat" style="margin-left:auto;color:#4b5563;">Refreshes every 30s · last 50 flagged checks</div>
  </div>

  <script>
    const API_BASE = "http://localhost:8000";

    // Lusaka neighbourhood coordinates
    const COORDS = {
      "Kanyama":      [-15.430, 28.278],
      "Matero":       [-15.382, 28.320],
      "Chilenje":     [-15.432, 28.342],
      "Ngombe":       [-15.398, 28.358],
      "Kalingalinga": [-15.418, 28.352],
      "Chawama":      [-15.453, 28.308],
      "Mandevu":      [-15.370, 28.318],
      "Kabwata":      [-15.432, 28.322],
      "Unknown":      [-15.417, 28.283],  // Lusaka center fallback
    };

    const LUSAKA_CENTER = [-15.417, 28.283];

    // Dark tile layer (Carto Dark Matter — no API key needed)
    const map = L.map("map", {
      center: LUSAKA_CENTER,
      zoom: 12,
      zoomControl: true,
    });

    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: "abcd",
      maxZoom: 19,
    }).addTo(map);

    let markerLayer = L.layerGroup().addTo(map);

    function makeCircle(verdict) {
      return {
        radius: verdict === "STOP" ? 12 : 9,
        fillColor: verdict === "STOP" ? "#ef4444" : "#f59e0b",
        color: verdict === "STOP" ? "#7f1d1d" : "#713f12",
        weight: 2,
        opacity: 0.9,
        fillOpacity: 0.75,
      };
    }

    function formatTime(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString() + " " + d.toLocaleTimeString();
    }

    function obscurePhone(phone) {
      // Show first 5 and last 2 digits only
      if (phone.length <= 7) return phone;
      return phone.slice(0, 5) + "·····" + phone.slice(-2);
    }

    async function loadFlags() {
      try {
        const res = await fetch(`${API_BASE}/flags?limit=50`);
        if (!res.ok) throw new Error(`Server returned ${res.status}`);
        const flags = await res.json();

        markerLayer.clearLayers();

        let stopCount = 0;
        let cautionCount = 0;

        flags.forEach(flag => {
          const coords = COORDS[flag.agent_location] || COORDS["Unknown"];
          // Small random jitter so overlapping dots are visible
          const jittered = [
            coords[0] + (Math.random() - 0.5) * 0.004,
            coords[1] + (Math.random() - 0.5) * 0.004,
          ];

          const circle = L.circleMarker(jittered, makeCircle(flag.verdict));

          circle.bindPopup(`
            <div>
              <span class="popup-verdict ${flag.verdict}">${flag.verdict}</span>
              <div class="popup-narration">${flag.narration || "No narration."}</div>
              <div class="popup-meta">
                ${obscurePhone(flag.phone_number)} · ${flag.agent_location}<br/>
                ${formatTime(flag.checked_at)}
              </div>
            </div>
          `, { maxWidth: 280 });

          markerLayer.addLayer(circle);

          if (flag.verdict === "STOP") stopCount++;
          else cautionCount++;
        });

        document.getElementById("stopCount").textContent = stopCount;
        document.getElementById("cautionCount").textContent = cautionCount;
        document.getElementById("totalCount").textContent = flags.length;
        document.getElementById("lastUpdate").textContent =
          "Updated " + new Date().toLocaleTimeString();

        document.getElementById("errorBanner").style.display = "none";

        // Show/hide no-data overlay
        const overlay = document.getElementById("noData");
        if (overlay) overlay.style.display = flags.length === 0 ? "block" : "none";

      } catch (err) {
        const banner = document.getElementById("errorBanner");
        banner.textContent = "Cannot reach backend: " + err.message;
        banner.style.display = "block";
        document.getElementById("lastUpdate").textContent = "Update failed";
      }
    }

    // Initial load + refresh every 30s
    loadFlags();
    setInterval(loadFlags, 30000);
  </script>

  <div class="no-data" id="noData" style="display:none">
    <div style="font-size:14px;font-weight:600;color:#6b7280">No flagged checks yet</div>
    <p>STOP and CAUTION verdicts will appear here as agents run checks.</p>
  </div>

</body>
</html>
